<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Sneha ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100vh;
    background: linear-gradient(135deg,#ff4e8a,#ff9ecf);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

/* Container */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    z-index: 5;
}

/* Text */
h1 {
    font-size: 70px;
    color: white;
    white-space: pre-line;
    text-align: center;
    text-shadow: 0 0 25px #ff004f;
}

/* Cake */
.cake {
    font-size: 230px;
    cursor: grab;
    user-select: none;
}

/* Hearts */
.heart {
    position: absolute;
    font-size: 25px;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}

/* Balloons */
.balloon {
    position: absolute;
    font-size: 50px;
    animation: balloonUp 10s linear infinite;
}

@keyframes balloonUp {
    from { transform: translateY(100vh); }
    to { transform: translateY(-20vh); }
}

/* Firecrackers */
.firecracker {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: explode 1s ease-out infinite;
}

@keyframes explode {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(15); opacity: 0; }
}

/* Click to start message */
.start-msg {
    position: absolute;
    bottom: 20px;
    color: white;
    font-size: 18px;
    opacity: 0.8;
}

</style>
</head>

<body>

<!-- 🎵 LOUD MUSIC -->
<audio id="bgMusic" loop>
    <source src="anokhi.mp3.mp3" type="audio/mp3">
</audio>

<div class="container">
    <h1 id="typing"></h1>
    <div class="cake" id="cake">🎂</div>
</div>

<div class="start-msg">🔊 Click anywhere for Music</div>

<script>

/* Make music loud */
const music = document.getElementById("bgMusic");
music.volume = 1.0; // Full volume

document.body.addEventListener("click", function() {
    music.play();
});

/* Typing Effect */
const text = "❤️ Happy Birthday\nSneha Cutuu ❤️";
let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 80);
    }
}
typeWriter();

/* Drag Cake */
const cake = document.getElementById("cake");
let isDragging = false, offsetX, offsetY;

cake.addEventListener("mousedown", function(e){
    isDragging = true;
    offsetX = e.offsetX;
    offsetY = e.offsetY;
    cake.style.position = "absolute";
});

document.addEventListener("mousemove", function(e){
    if(isDragging){
        cake.style.left = (e.pageX - offsetX) + "px";
        cake.style.top = (e.pageY - offsetY) + "px";
    }
});

document.addEventListener("mouseup", function(){
    isDragging = false;
});

/* Hearts */
for(let i=0;i<20;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(4+Math.random()*3)+"s";
    document.body.appendChild(heart);
}

/* Balloons */
for(let i=0;i<15;i++){
    let balloon=document.createElement("div");
    balloon.className="balloon";
    balloon.innerHTML="🎈";
    balloon.style.left=Math.random()*100+"vw";
    balloon.style.animationDuration=(6+Math.random()*5)+"s";
    document.body.appendChild(balloon);
}

/* Firecrackers */
const colors=["#ff0","#fff","#00f","#0f0","#f0f","#ff4500"];
for(let i=0;i<50;i++){
    let fire=document.createElement("div");
    fire.className="firecracker";
    fire.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
    fire.style.left=Math.random()*100+"vw";
    fire.style.top=Math.random()*100+"vh";
    fire.style.animationDelay=Math.random()+"s";
    document.body.appendChild(fire);
}

</script>

</body>
</html>
